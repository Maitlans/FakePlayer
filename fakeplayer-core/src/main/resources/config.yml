# =========================================================================================================
# Important
# DO NOT EDIT config.tmpl.yml !!!
# Copy and rename this file to config.yml as your configuration file.
# Any changes to this file will be reverted.
# =========================================================================================================

# DO NOT EDIT
version: 25

# Language settings.
# Options: en, zh, zh_cn, zh_tw, zh_hk
i18n:
  locale: en
  message_prefix: '&7[&bFakePlayer&7] '


# Maximum number of fake players allowed on the server at the same time.
# Default: 1000
server-limit: 1000


# Maximum number of fake players each player can spawn.
# Default: 1
player-limit: 1


# If enabled, players sharing the same IP address also share the player-limit value.
detect-ip: true


# Maximum lifespan for fake players.
# Unit: minutes. Set to 0 for permanent fake players.
lifespan: 0


# Default fake player name template.
# If this value is empty, fake players use the creator's name plus a numerical suffix.
# Otherwise, fake players use this template plus a numerical suffix.
# This only applies when the spawn command is used without a custom name.
# Variables:
#   %c: creator name
# Notes:
#   1. Names containing characters other than letters, numbers, and underscores can break many vanilla
#      and third-party commands.
#   2. Names longer than 16 characters will be truncated.
#   3. Names cannot start with '-'.
#   4. This option is not recommended on public servers because reused names can inherit permissions,
#      region access, or stored items from previous fake players.
name-template: ''

# Prefix added to generated and custom fake player names.
name-prefix: ''

# Allowed characters for custom fake player names.
# Format: regular expression
# Default: '^[a-zA-Z0-9_]+$'
# Notes:
#   1. Allowing characters other than letters, numbers, and underscores can break many vanilla
#      and third-party commands.
#   2. Custom names require the fakeplayer.spawn.name permission.
#   3. If you change this regular expression, keep it anchored with ^ and $.
name-pattern: '^[a-zA-Z0-9_]+$'

# Fake player name style in the player list.
# Options:
#   black, dark_blue, dark_green, dark_aqua, dark_red, light_purple, gold, gray,
#   dark_gray, blue, green, aqua, red, dark_purple, yellow, white
#   obfuscated, bold, strikethrough, underlined, italic
name-style: gray, italic


# Prevent other plugins from kicking fake players.
# This can help with compatibility issues caused by login plugins or kick commands.
# Options:
#   NEVER: do not prevent kicking
#   ON_SPAWNING: only prevent kicking while fake players are spawning
#   ALWAYS: always prevent kicks from other plugins and the /kick command
prevent-kicking: ON_SPAWNING


# Remove fake players when their creator quits.
# If the creator is only switching servers through a proxy, this may not trigger removal.
follow-quiting: true

# Run creator-quit cleanup immediately instead of waiting for the periodic cleanup task.
# Delay is measured in seconds. If the creator reconnects during the delay, fake players are kept.
follow-quiting-force: true
follow-quiting-force-delay: 3


# Drop fake player inventory items when fake players are removed.
drop-inventory-on-quiting: false


# Persist fake player data.
# If this is false, consider setting drop-inventory-on-quiting to true so players cannot store items
# in fake player inventories.
# Default: true
persistent-data: true


# Kick dead fake players.
# If false, players can use /fp respawn to respawn them.
kick-on-dead: false

# Automatically respawn fake players after they die.
# This takes priority over kick-on-dead when enabled.
# Default: true
auto-respawn-on-death: true


# Stress test controls used by /fp stress commands.
# These commands are OP-only and can spawn or drive many fake players.
stress:
  default-profile: default
  profiles:
    default:
      spawn:
        batch-size: 5
        batch-interval-ticks: 1
      spread:
        # SAME_Y: keep the command sender's Y level.
        # SURFACE: place each bot on the highest block at its random X/Z.
        y-mode: SAME_Y
      random-walk:
        tick-interval: 5
        direction-change-min-ticks: 20
        direction-change-max-ticks: 80
        speed: 1.0
        sprint-chance: 0.25
        sneak-chance: 0.05
        jump-chance: 0.03
        use-chance: 0.02
        attack-chance: 0.02
        use-action-cooldown-ticks: 20
        attack-action-cooldown-ticks: 20
        max-use-actions-per-tick: 10
        max-attack-actions-per-tick: 10
        hotbar-change-chance: 0.05
        swap-offhand-chance: 0.01
      mirror:
        movement: true
        look: true
        actions: true
        commands: true
        commands-as-op: true
        input-sync-window-ticks: 100
        debug-inputs: false
        command-ignore-prefixes:
          - /fp
          - /fakeplayer


# Server TPS protection.
# If the average TPS drops below this value, fake player limits are gradually reduced.
# Default: 0, disabled.
# Note: enabling this can disrupt redstone machines or other fake-player-dependent setups.
kale-tps: 0


# Inventory view implementation.
# Options:
#   AUTO: choose an implementation based on installed plugins. Currently supports OpenInv.
#   SIMPLE: built-in implementation; cannot view or edit equipment slots.
invsee-implement: AUTO


# Pre-spawn commands.
# The server runs these commands before trying to spawn a fake player.
# This is useful for adding fake players to a whitelist.
# Variables:
#   %p: fake player name
#   %u: fake player UUID
#   %c: creator name
pre-spawn-commands:
  - ''
  - ''


# Post-spawn commands.
# The server runs these commands while the fake player is spawning, during PlayerJoinEvent.
# Variables:
#   %p: fake player name
#   %u: fake player UUID
#   %c: creator name
post-spawn-commands:
  - ''
  - ''


# After-spawn commands.
# The server runs these commands after the fake player has spawned, after PlayerJoinEvent.
# This is useful for assigning permissions or groups.
# Variables:
#   %p: fake player name
#   %u: fake player UUID
#   %c: creator name
after-spawn-commands:
  - ''
  - ''


# Self commands.
# The fake player runs these commands after joining the server.
# This is useful for login commands.
# Make sure passwords are strong enough for your login plugin.
# Variables:
#   %p: fake player name
#   %u: fake player UUID
#   %c: creator name
self-commands:
  - ''
  - ''


# Post-quit commands.
# The server runs these commands while the fake player is quitting, during PlayerQuitEvent.
# The fake player is still present on the server when these commands run.
# This is useful for cleaning inventories or plugin state.
# Variables:
#   %p: fake player name
#   %u: fake player UUID
#   %c: creator name
post-quit-commands:
  - ''
  - ''


# After-quit commands.
# The server runs these commands after the fake player has quit, after PlayerQuitEvent.
# This is useful for cleanup tasks such as removing whitelist entries or permissions.
# Variables:
#   %p: fake player name
#   %u: fake player UUID
#   %c: creator name
after-quit-commands:
  - ''
  - ''


# Commands allowed through /fp cmd without the fakeplayer.cmd permission.
# Warning: granting fakeplayer.cmd lets players control fake players to run any command they have permission for.
allow-commands:
  - ''
  - ''


# Default fake player features.
# These apply when the player has not changed settings with /fp config or lacks permission.
default-features:
  collidable: true
  pickup_items: true
  skin: true
  look_at_entity: false
  invulnerable: false
  replenish: false
  autofish: false
  wolverine: false


# Check for updates.
# This only checks for updates; it does not download them.
check-for-updates: true
